## KingCola-ICG (React + Vite) production nginx config
## Usage: replace your site config with this file (adjust cert/include paths if needed).

server {
    listen 80;
    server_name kingcola-icg.cn www.kingcola-icg.cn;

    # ACME challenge path for certificate issuance in BT panel
    include /www/server/panel/vhost/nginx/well-known/www.kingcola-icg.cn.conf;

    return 301 https://www.kingcola-icg.cn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kingcola-icg.cn www.kingcola-icg.cn;

    root /www/wwwroot/www.kingcola-icg.cn/dist;
    index index.html;

    # CERT-APPLY-CHECK
    include /www/server/panel/vhost/nginx/well-known/www.kingcola-icg.cn.conf;

    # SSL
    ssl_certificate /www/server/panel/vhost/cert/www.kingcola-icg.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.kingcola-icg.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # IMPORTANT: index.html must not be cached, otherwise old hashed assets cause 404
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed assets can be aggressively cached
    location ~* ^/assets/.*\.(?:js|mjs|css|map|png|jpe?g|gif|svg|webp|ico|woff2?|ttf|eot|glb|mp4|webm)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Optional: cache other static files with a short TTL
    location ~* \.(?:json|txt|xml)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # Pre-compressed assets generated by "node scripts/compress-dist.mjs"
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml
        application/wasm;

    # If your nginx does not have ngx_brotli, comment out the four lines below.
    brotli on;
    brotli_static on;
    brotli_comp_level 5;
    brotli_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml
        application/wasm;

    # Security
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$") {
        return 403;
    }

    access_log /www/wwwlogs/www.kingcola-icg.cn.log;
    error_log /www/wwwlogs/www.kingcola-icg.cn.error.log;
}