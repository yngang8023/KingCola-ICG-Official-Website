server {
  listen 80;
  server_name _;

  root /var/www/kingcola-icg/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip (supports pre-compressed *.gz generated during build)
  gzip on;
  gzip_static on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    text/xml
    image/svg+xml
    application/wasm;

  # Brotli (requires ngx_brotli module in your Nginx build)
  brotli on;
  brotli_static on;
  brotli_comp_level 5;
  brotli_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    text/xml
    image/svg+xml
    application/wasm;

  location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
