  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var redirectedPath = params.get("p");
      if (!redirectedPath) return;

      var restoredPath = decodeURIComponent(redirectedPath);
      var query = params.get("q");
      var repoBase = window.location.pathname.replace(/\/$/, "");
      var nextUrl = repoBase + restoredPath;

      if (query) {
        nextUrl += "?" + decodeURIComponent(query);
      }

      if (window.location.hash) {
        nextUrl += window.location.hash;
      }

      window.history.replaceState(null, "", nextUrl);
    })();
  </script>
